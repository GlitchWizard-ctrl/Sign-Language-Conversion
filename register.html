<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISL Sign Recognition — Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card glass-panel" style="max-width: 480px;">
            <div class="brand-logo">
                <i class="fa-solid fa-hands-asl-interpreting" style="color: white;"></i>
            </div>
            <h2>Create Account</h2>
            <p>Join the ISL Sign Recognition Platform</p>

            <div id="alertMessage" class="alert-message alert-error">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span id="alertText">Something went wrong.</span>
            </div>
            <div id="successMessage" class="alert-message alert-success">
                <i class="fa-solid fa-circle-check"></i>
                <span id="successText">Account created! Redirecting to login...</span>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <div class="input-wrapper">
                        <input type="text" id="fullname" class="form-input" placeholder="Enter your full name" required>
                        <i class="fa-solid fa-id-card"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" class="form-input" placeholder="Choose a username" required>
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="Create a password (min 6 chars)" required>
                        <i class="fa-solid fa-lock"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" class="form-input" placeholder="Repeat your password" required>
                        <i class="fa-solid fa-shield-halved"></i>
                    </div>
                </div>
                <button type="submit" id="submitBtn" class="login-btn">
                    <span>Create Account</span>
                </button>
            </form>

            <div class="auth-switch">
                Already have an account? <a href="login.html" class="auth-link">Sign in</a>
            </div>
        </div>
    </div>
    <script src="register.js"></script>
</body>
</html>
