<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISL Sign Recognition — Sign In</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Core Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card glass-panel">
            <div class="brand-logo">
                <i class="fa-solid fa-hands-asl-interpreting" style="color: white;"></i>
            </div>
            <h2>Sign In</h2>
            <p>ISL Real-Time Hand Landmark Classifier</p>

            <div id="alertMessage" class="alert-message alert-error">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span id="alertText">Invalid credentials. Try again.</span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" class="form-input" placeholder="Enter username" required value="admin">
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="Enter password" required value="password">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="login-btn">
                    <span>Sign In</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Login JS Logic -->
    <script src="login.js"></script>
</body>
</html>
